---
layout: default
---
<section class="page-hero">
  <div class="container">
    <div class="page-hero-ornament">✦</div>
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}<p class="page-subtitle">{{ page.subtitle }}</p>{% endif %}
  </div>
</section>

<section class="page-content">
  <div class="container container--narrow">
    {{ content }}
  </div>
</section>
